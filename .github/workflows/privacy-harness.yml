name: Privacy Harness

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  harness-integrity:
    name: Validate harness integrity
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Validate suite compiles
        run: npx playwright test tests/privacy-harness --list

  privacy-harness-prod:
    name: Run production privacy verification
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      PIXPASS_BASE_URL: ${{ vars.PIXPASS_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Validate base URL is configured
        run: test -n "$PIXPASS_BASE_URL"

      - name: Run production privacy harness (non-blocking)
        run: npm run test:privacy -- --reporter=html,line

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: privacy-harness-report
          path: playwright-report
          if-no-files-found: ignore
